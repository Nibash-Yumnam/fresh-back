<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firefly Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: url(https://i.pinimg.com/originals/44/6e/3b/446e3b79395a287ca32f7977dd83b290.jpg);
            background-size: cover;
            background-attachment: fixed;
        }

        /* Navigation Bar */
        .nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 30px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-bar h1 {
            color: #ffff00;
            font-size: 24px;
            font-family: Arial, sans-serif;
            text-shadow: 0 0 10px rgba(255, 255, 0, 0.8);
        }

        .nav-links a {
            color: #ffff00;
            text-decoration: none;
            margin-left: 30px;
            font-family: Arial, sans-serif;
            font-weight: bold;
            transition: all 0.3s ease;
            text-shadow: 0 0 5px rgba(255, 255, 0, 0.6);
        }

        .nav-links a:hover {
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 255, 0, 1);
        }

        .firefly {
            position: fixed;
            width: 0.4vw;
            height: 0.4vw;
            pointer-events: none;
            z-index: -1;
        }

        .firefly::before,
        .firefly::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            top: 0;
            left: 0;
        }

        .firefly::before {
            background: radial-gradient(circle, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0) 70%);
        }

        .firefly::after {
            background: yellow;
            opacity: 0;
            filter: blur(0.3vw);
        }

        /* Firefly animations */
        @keyframes drift {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes flash {
            0%, 30%, 100% {
                opacity: 0;
                filter: blur(0.3vw) drop-shadow(0 0 0 yellow);
            }
            5% {
                opacity: 1;
                filter: blur(0.2vw) drop-shadow(0 0 2vw yellow) drop-shadow(0 0 0.8vw #ffff00);
            }
        }

        /* 30 Fireflies */
        .firefly:nth-child(1) { animation: move1 18s ease-in-out infinite; left: 10%; top: 15%; }
        .firefly:nth-child(2) { animation: move2 22s ease-in-out infinite; left: 20%; top: 25%; }
        .firefly:nth-child(3) { animation: move3 20s ease-in-out infinite; left: 30%; top: 35%; }
        .firefly:nth-child(4) { animation: move4 24s ease-in-out infinite; left: 70%; top: 20%; }
        .firefly:nth-child(5) { animation: move5 19s ease-in-out infinite; left: 80%; top: 40%; }
        .firefly:nth-child(6) { animation: move6 21s ease-in-out infinite; left: 15%; top: 60%; }
        .firefly:nth-child(7) { animation: move7 23s ease-in-out infinite; left: 75%; top: 70%; }
        .firefly:nth-child(8) { animation: move8 25s ease-in-out infinite; left: 50%; top: 10%; }
        .firefly:nth-child(9) { animation: move9 20s ease-in-out infinite; left: 85%; top: 50%; }
        .firefly:nth-child(10) { animation: move10 22s ease-in-out infinite; left: 25%; top: 75%; }
        .firefly:nth-child(11) { animation: move11 19s ease-in-out infinite; left: 60%; top: 60%; }
        .firefly:nth-child(12) { animation: move12 21s ease-in-out infinite; left: 40%; top: 80%; }
        .firefly:nth-child(13) { animation: move13 26s ease-in-out infinite; left: 90%; top: 15%; }
        .firefly:nth-child(14) { animation: move14 24s ease-in-out infinite; left: 5%; top: 40%; }
        .firefly:nth-child(15) { animation: move15 28s ease-in-out infinite; left: 45%; top: 90%; }
        .firefly:nth-child(16) { animation: move16 20s ease-in-out infinite; left: 35%; top: 45%; }
        .firefly:nth-child(17) { animation: move17 23s ease-in-out infinite; left: 65%; top: 55%; }
        .firefly:nth-child(18) { animation: move18 21s ease-in-out infinite; left: 12%; top: 35%; }
        .firefly:nth-child(19) { animation: move19 25s ease-in-out infinite; left: 88%; top: 65%; }
        .firefly:nth-child(20) { animation: move20 22s ease-in-out infinite; left: 52%; top: 25%; }
        .firefly:nth-child(21) { animation: move21 24s ease-in-out infinite; left: 42%; top: 55%; }
        .firefly:nth-child(22) { animation: move22 19s ease-in-out infinite; left: 72%; top: 35%; }
        .firefly:nth-child(23) { animation: move23 26s ease-in-out infinite; left: 28%; top: 65%; }
        .firefly:nth-child(24) { animation: move24 23s ease-in-out infinite; left: 92%; top: 45%; }
        .firefly:nth-child(25) { animation: move25 21s ease-in-out infinite; left: 18%; top: 75%; }
        .firefly:nth-child(26) { animation: move26 25s ease-in-out infinite; left: 62%; top: 15%; }
        .firefly:nth-child(27) { animation: move27 22s ease-in-out infinite; left: 38%; top: 85%; }
        .firefly:nth-child(28) { animation: move28 24s ease-in-out infinite; left: 78%; top: 55%; }
        .firefly:nth-child(29) { animation: move29 20s ease-in-out infinite; left: 8%; top: 65%; }
        .firefly:nth-child(30) { animation: move30 27s ease-in-out infinite; left: 55%; top: 35%; }

        .firefly::before {
            animation: drift 15s linear infinite;
        }

        .firefly::after {
            animation: drift 15s linear infinite, flash 6s ease-in-out infinite;
        }

        @keyframes move10 { 0% { transform: translateY(0) scale(0.7); } 50% { transform: translateY(-145px) scale(0.7); } 100% { transform: translateY(0) scale(0.7); } }
        @keyframes move11 { 0% { transform: translateY(0) scale(0.5); } 50% { transform: translateY(-105px) scale(0.8); } 100% { transform: translateY(0) scale(0.5); } }
        @keyframes move12 { 0% { transform: translateY(0) scale(0.6); } 50% { transform: translateY(-130px) scale(0.6); } 100% { transform: translateY(0) scale(0.6); } }
        @keyframes move13 { 0% { transform: translateY(0) scale(0.7); } 50% { transform: translateY(-120px) scale(0.7); } 100% { transform: translateY(0) scale(0.7); } }
        @keyframes move14 { 0% { transform: translateY(0) scale(0.5); } 50% { transform: translateY(-140px) scale(0.8); } 100% { transform: translateY(0) scale(0.5); } }

        @keyframes move16 { 0% { transform: translateY(0) scale(0.7); } 50% { transform: translateY(-155px) scale(0.5); } 100% { transform: translateY(0) scale(0.7); } }

        @keyframes move29 { 0% { transform: translateY(0) scale(0.6); } 50% { transform: translateY(-115px) scale(0.8); } 100% { transform: translateY(0) scale(0.6); } }
        @keyframes move30 { 0% { transform: translateY(0) scale(0.4); } 50% { transform: translateY(-150px) scale(0.6); } 100% { transform: translateY(0) scale(0.4); } }
