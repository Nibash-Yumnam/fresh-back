services:
  - type: web
    name: php-auth-app
    runtime: docker
    healthCheckPath: /index.php
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: DB_HOST
        value: localhost
      - key: DB_USER
        value: root
      - key: DB_PASSWORD
        value: ""
      - key: DB_NAME
        value: user_db
      - key: DB_PORT
        value: 3306
