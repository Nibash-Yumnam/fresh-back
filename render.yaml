services:
  - type: web
    name: php-auth-app
    runtime: php
    plan: free
    buildCommand: composer install --no-dev --optimize-autoloader
    startCommand: "php -S 0.0.0.0:$PORT -t public"
    healthCheckPath: /index.php
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: DB_HOST
        value: localhost
      - key: DB_USER
        value: root
      - key: DB_PASSWORD
        value: ""
      - key: DB_NAME
        value: user_db
      - key: DB_PORT
        value: 3306
